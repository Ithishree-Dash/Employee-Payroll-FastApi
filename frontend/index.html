
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Employee Payroll System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
<h1>Employee Payroll System</h1>

<div class="grid">
<div class="card">
<h2>Full Time Employee</h2>
<input id="ftname" placeholder="Name">
<input id="ftid" placeholder="Employee ID">
<input id="ftsalary" placeholder="Monthly Salary">
<button onclick="addFT()">Add Employee</button>
</div>

<div class="card">
<h2>Part Time Employee</h2>
<input id="ptname" placeholder="Name">
<input id="ptid" placeholder="Employee ID">
<input id="hours" placeholder="Hours Worked">
<input id="rate" placeholder="Hourly Rate">
<button onclick="addPT()">Add Employee</button>
</div>
</div>

<div class="card">
<h2>Employee Records</h2>
<button onclick="loadEmployees()">Refresh</button>
<table id="tbl">
<thead>
<tr><th>ID</th><th>Name</th><th>Type</th><th>Salary</th><th>Action</th></tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>
<script src="js/app.js"></script>
</body>
</html>
